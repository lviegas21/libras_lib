name: vlibras_player
description: Flutter plugin for VLibras — Brazilian Sign Language (Libras) text-to-avatar translation. Supports inline player and floating accessibility overlay on Android and iOS.
version: 0.1.0
homepage: https://github.com/your-org/vlibras_player

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  plugin_platform_interface: ^2.1.8

flutter:
  plugin:
    platforms:
      android:
        package: br.gov.vlibras.vlibras_player
        pluginClass: VLibrasPlayerPlugin
      ios:
        pluginClass: VLibrasPlayerPlugin
