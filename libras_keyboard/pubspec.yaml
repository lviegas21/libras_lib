name: libras_keyboard
description: Accessible in-app Libras (Brazilian Sign Language) datilologia keyboard for Flutter.
version: 0.1.0
homepage: https://github.com/your-org/libras_keyboard

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  assets:
    - assets/libras/
    # PNG hand-sign assets for every letter A-Z plus backspace, space, clear.
